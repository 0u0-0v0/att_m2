<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Thin.woff') format('woff'); font-weight: 100; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2508-1@1.0/MinSans-ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Light.woff') format('woff'); font-weight: 300; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Regular.woff') format('woff'); font-weight: normal; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Medium.woff') format('woff'); font-weight: 500; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2508-1@1.0/MinSans-Bold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Bold.woff') format('woff'); font-weight: 700; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2508-1@1.0/MinSans-ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
        @font-face { font-family: 'MinSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/MinSans-Black.woff') format('woff'); font-weight: 900; font-display: swap; }

        html, body { overscroll-behavior-y: contain; height: 100%; width: 100%; overflow: hidden; font-family: 'MinSans', sans-serif; background-color: #f8fafc; }
        #root { height: 100%; width: 100%; overflow-y: auto; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; font-weight: 700; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #f8fafc; z-index: 9999;
        }
    </style>
    
<script src="./js/react.js"></script>
<script src="./js/react-dom.js"></script>
<script src="./js/babel.js"></script>
<script src="./js/tailwind.js"></script>
<link rel="stylesheet" href="./css/all.min.css">
</head>
<body>
    <div id="loading-overlay">
        <div style="width:40px; height:40px; border:4px solid #e2e8f0; border-top:4px solid #2563eb; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:15px;"></div>
        <div style="color:#64748b; font-size:14px; font-weight:500;">출결 시스템을 불러오는 중입니다...</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('att_groups')) || ['1반']);
            const [activeGroupId, setActiveGroupId] = useState(() => localStorage.getItem('att_active_group') || '전체');
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('att_students')) || []);
   const [templates, setTemplates] = useState(() => JSON.parse(localStorage.getItem('att_templates')) || [
    { id: 't1', title: '미등교 확인', content: '[미등교 확인] {이름} 학생 금일 {시간} 기준 미등교 상태입니다. 확인 부탁드립니다. - {교사}' },
    { id: 't2', title: '병결 확인', content: '[병결확인] {이름} 학생으로부터 오늘 병결을 사용한다고 연락 받았습니다. 병원 진료 후 서류 잘 챙길 수 있도록 한번 더 확인 부탁드립니다.- {교사}' },
    { id: 't3', title: '생결 확인', content: '[생결확인] {이름} 학생이 오늘 생리통으로 등교가 어렵다고 합니다. 확인 부탁드리며, 서류 챙겨 보내주세요! - {교사}' }
]);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('att_teacher_name') || '000 선생님');
            
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [modalMode, setModalMode] = useState(null); 
            const [targetStudent, setTargetStudent] = useState(null);
            const [showGroupModal, setShowGroupModal] = useState(false);
            const [showInstallBtn, setShowInstallBtn] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            useEffect(() => {
                const overlay = document.getElementById('loading-overlay');
                if (overlay) overlay.style.display = 'none';
            }, []);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstallBtn(true); });
            }, []);

            useEffect(() => {
                localStorage.setItem('att_groups', JSON.stringify(groups));
                localStorage.setItem('att_active_group', activeGroupId);
                localStorage.setItem('att_students', JSON.stringify(students));
                localStorage.setItem('att_templates', JSON.stringify(templates));
                localStorage.setItem('att_teacher_name', teacherName);
            }, [groups, activeGroupId, students, templates, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const filteredStudents = useMemo(() => {
                return students.filter(s => (activeGroupId === '전체' || s.group === activeGroupId) && s.name.includes(searchQuery))
                .sort((a, b) => a.name.localeCompare(b.name));
            }, [students, activeGroupId, searchQuery]);

            const setAllTargets = (type) => {
                const targetIds = filteredStudents.map(s => s.id);
                setStudents(prev => prev.map(s => {
                    if (targetIds.includes(s.id)) {
                        if (type === 'self') return { ...s, activeTargets: { self: true, father: false, mother: false } };
                        if (type === 'parents') return { ...s, activeTargets: { self: false, father: true, mother: true } };
                        if (type === 'both') return { ...s, activeTargets: { self: true, father: true, mother: true } };
                    }
                    return s;
                }));
            };

            // ✅ 양식 다운로드 로직 (반, 이름, 본인번호, 부번호, 모번호, 메모 순서)
            const downloadTemplate = () => {
                const headers = "반,이름,본인번호,부번호,모번호,메모";
                const example = "1반,홍길동,010-1234-5678,010-1111-2222,010-3333-4444,비고내용";
                const csvContent = "\ufeff" + headers + "\n" + example;
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", "출결매니저_양식.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // ✅ 양식 업로드 로직 (순서: 반, 이름, 본인번호, 부번호, 모번호, 메모)
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                        
                        let addedCount = 0;
                        const newGroups = [...groups];
                        const newStudentsList = rows.map(row => {
                            const cols = row.split(',').map(s => s?.trim());
                            // 순서: [0:반, 1:이름, 2:본인번호, 3:부번호, 4:모번호, 5:메모]
                            const [group, name, self, father, mother, memo] = cols;
                            
                            if (!name || !group) return null;
                            
                            if (!newGroups.includes(group)) newGroups.push(group);
                            addedCount++;
                            
                            return { 
                                id: Date.now() + Math.random(), 
                                name, 
                                group, 
                                self: self || '', 
                                father: father || '', 
                                mother: mother || '', 
                                memo: memo || '', 
                                activeTargets: { self: true, father: false, mother: false } 
                            };
                        }).filter(Boolean);

                        setGroups(newGroups);
                        setStudents(prev => [...prev, ...newStudentsList]);
                        alert(`${addedCount}명의 학생 정보를 성공적으로 불러왔습니다.`);
                    } catch (err) {
                        alert("파일을 읽는 중 오류가 발생했습니다. 양식을 확인해 주세요.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // 같은 파일 재업로드 가능하도록 초기화
            };

            const insertTag = (templateId, tag) => {
                const el = document.getElementById(`textarea-${templateId}`);
                if (!el) return;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const targetTp = templates.find(t => t.id === templateId);
                const nextContent = targetTp.content.substring(0, start) + tag + targetTp.content.substring(end);
                setTemplates(templates.map(t => t.id === templateId ? {...t, content: nextContent} : t));
                setTimeout(() => { el.focus(); el.setSelectionRange(start + tag.length, start + tag.length); }, 10);
            };

            const updateSentStatus = (targetIds, templateTitle) => {
                const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                setStudents(prev => prev.map(s => targetIds.includes(s.id) ? { ...s, lastSent: `${templateTitle} (${timeStr})` } : s));
            };

            const handleCall = (s) => {
                const t = s.activeTargets || { self: true };
                let num = "";
                if (t.self && s.self) num = s.self;
                else if (t.father && s.father) num = s.father;
                else if (t.mother && s.mother) num = s.mother;
                else num = s.self || s.father || s.mother;
                if (!num) return alert("전화번호가 등록되어 있지 않습니다.");
                window.location.href = `tel:${num.replace(/[^0-9*]/g, '')}`;
            };

            const sendSMS = (targets, tp) => {
                if (targets.length === 0) return;
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                const nums = [];
                targets.forEach(s => {
                    const t = s.activeTargets || { self: true };
                    if (t.self && s.self) nums.push(s.self.replace(/[^0-9*]/g, ''));
                    if (t.father && s.father) nums.push(s.father.replace(/[^0-9*]/g, ''));
                    if (t.mother && s.mother) nums.push(s.mother.replace(/[^0-9*]/g, ''));
                });
                if (nums.length === 0) return alert("번호가 없습니다.");
                const displayName = targets.length > 1 ? "" : targets[0].name;
                const msg = tp.content.replace(/{이름}/g, displayName).replace(/{시간}/g, currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })).replace(/{교사}/g, teacherName).trim();
                updateSentStatus(targets.map(t => t.id), tp.title);
                window.location.href = `sms:${nums.join(isIos ? ',' : ';')}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`;
            };

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showInstallBtn && (
                        <div className="bg-slate-900 text-white p-3 flex justify-between items-center z-[100] animate-in text-xs font-bold">
                            <span className="ml-2">📲 앱 설치로 오프라인 사용 환경 강화!</span>
                            <button onClick={() => { deferredPrompt.prompt(); setShowInstallBtn(false); }} className="bg-blue-600 px-4 py-1.5 rounded-xl text-xs font-black mr-2 shadow-lg">설치</button>
                        </div>
                    )}

                    <header className="p-6 bg-blue-600 text-white shadow-md flex-shrink-0">
                        <div className="flex justify-between items-center mb-4 font-black italic uppercase text-2xl tracking-tighter">
                            <h1 style={{fontWeight: 900}}>Attendance Pro</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-1 rounded-full font-bold">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-white/10 p-3 rounded-2xl w-full border-none outline-none font-bold placeholder:text-blue-100 shadow-inner" />
                    </header>

                    <nav className="flex border-b bg-white z-10 flex-shrink-0 font-bold">
                        <button onClick={() => setActiveTab('list')} className={`flex-1 py-4 text-sm ${activeTab === 'list' ? 'active-tab' : 'text-slate-300'}`}>명단</button>
                        <button onClick={() => setActiveTab('templates')} className={`flex-1 py-4 text-sm ${activeTab === 'templates' ? 'active-tab' : 'text-slate-300'}`}>문구</button>
                    </nav>

                    <main className="flex-1 overflow-y-auto no-scrollbar p-4 pb-64">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 items-center">
                                    <button onClick={() => setShowGroupModal(true)} className="flex-shrink-0 w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center shadow-lg"><i className="fa-solid fa-cog"></i></button>
                                    <button onClick={() => confirm('기록을 지울까요?') && setStudents(students.map(s => ({...s, lastSent: null})))} className="flex-shrink-0 w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-400 flex items-center justify-center shadow-sm"><i className="fa-solid fa-rotate-right text-xs"></i></button>
                                    <button onClick={() => { if(selectedIds.length === filteredStudents.length) setSelectedIds([]); else setSelectedIds(filteredStudents.map(s => s.id)); }} className={`flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center shadow-md transition-colors ${selectedIds.length > 0 && selectedIds.length === filteredStudents.length ? 'bg-blue-600 text-white' : 'bg-white text-slate-400 border'}`}><i className="fa-solid fa-check-double text-xs"></i></button>
                                    {['전체', ...groups].map(g => (
                                        <button key={g} onClick={() => { setActiveGroupId(g); setSelectedIds([]); }} className={`flex-shrink-0 px-5 py-2.5 rounded-xl text-[11px] font-black transition-all ${activeGroupId === g ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border'}`}>{g}</button>
                                    ))}
                                </div>
                                
                                <div className="flex gap-1.5 items-center">
                                    <input placeholder="검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-20 flex-shrink-0 px-3 py-3 rounded-2xl shadow-sm outline-none border-none font-medium text-[13px]" />
                                    <button onClick={() => setAllTargets('self')} className="flex-1 bg-slate-700 text-white py-3 rounded-2xl text-[10px] font-black shadow-sm active:scale-95 transition-all">본인</button>
                                    <button onClick={() => setAllTargets('parents')} className="flex-1 bg-slate-700 text-white py-3 rounded-2xl text-[10px] font-black shadow-sm active:scale-95 transition-all">부모</button>
                                    <button onClick={() => setAllTargets('both')} className="flex-1 bg-slate-700 text-white py-3 rounded-2xl text-[10px] font-black shadow-sm active:scale-95 transition-all">본인+부모</button>
                                </div>

                                <div className="space-y-3">
                                    {filteredStudents.map(s => (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex flex-col gap-3 border-2 transition-all ${selectedIds.includes(s.id) ? 'border-blue-500 ring-4 ring-blue-50' : 'border-transparent'}`}>
                                            <div className="flex items-center gap-3">
                                                <div onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])} className={`w-8 h-8 rounded-xl border-2 flex items-center justify-center flex-shrink-0 ${selectedIds.includes(s.id)?'bg-blue-600 border-blue-600 text-white':'border-slate-100 bg-slate-50'}`}>{selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}</div>
                                                <div className="flex-1 truncate" onClick={() => { setTargetStudent(s); setModalMode('view'); }}>
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-bold text-slate-800 text-sm">{s.name} <span className="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded-lg text-slate-400 ml-1">{s.group}</span></span>
                                                        {s.lastSent && <span className="bg-blue-50 text-blue-500 text-[9px] px-2 py-0.5 rounded-lg font-bold border border-blue-100 leading-tight">보냄: {s.lastSent}</span>}
                                                    </div>
                                                    {s.memo && <div className="text-[9px] text-slate-400 font-medium truncate mt-0.5">{s.memo}</div>}
                                                </div>
                                                <div className="flex flex-wrap gap-1 justify-end max-w-[150px]">
                                                    <button onClick={(e) => { e.stopPropagation(); handleCall(s); }} className="w-8 h-8 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center text-[10px]"><i className="fa-solid fa-phone"></i></button>
                                                    {templates.map((tp, idx) => (
    <button 
        key={tp.id} 
        onClick={(e) => { e.stopPropagation(); sendSMS([s], tp); }} 
        className={`px-2 h-8 rounded-lg flex items-center justify-center text-[10px] font-bold border-0 flex-1 min-w-[45px] ${idx === 0 ? 'bg-rose-50 text-rose-500' : idx === 1 ? 'bg-amber-50 text-amber-500' : 'bg-blue-50 text-blue-600'}`}
    >
        {tp.title.split(' ')[0]}
    </button>
))}
                                                </div>
                                            </div>
                                            <div className="flex gap-1.5 pt-1 border-t border-slate-50">
                                                {[{k:'self',l:'본인'},{k:'father',l:'부'},{k:'mother',l:'모'}].map(t => (
                                                    <button key={t.k} onClick={() => { const newT = {...(s.activeTargets || {self:true}), [t.k]: !(s.activeTargets?.[t.k])}; setStudents(students.map(st => st.id === s.id ? {...st, activeTargets: newT} : st)); }} className={`flex-1 py-1.5 rounded-xl text-[10px] font-bold transition-all ${(s.activeTargets?.[t.k] || (t.k==='self' && !s.activeTargets)) ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-400'}`}>{t.l}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4 pb-10">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,title:e.target.value}:t))} className="w-full font-black text-blue-600 border-b pb-1 mb-3 outline-none border-slate-50 focus:border-blue-200" />
                                        <div className="flex gap-1 mb-3">
                                            {['{이름}', '{교사}', '{시간}'].map(tag => (
                                                <button key={tag} onClick={() => insertTag(tp.id, tag)} className="bg-slate-100 text-[10px] px-2.5 py-1.5 rounded-xl font-black text-slate-500 active:bg-slate-200 shadow-sm border border-slate-50">{tag} 삽입</button>
                                            ))}
                                        </div>
                                        <textarea id={`textarea-${tp.id}`} value={tp.content} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,content:e.target.value}:t))} className="w-full text-xs text-slate-500 bg-slate-50 p-4 rounded-2xl min-h-[120px] outline-none leading-relaxed border focus:border-blue-100" />
                                        <button onClick={() => confirm('삭제?') && setTemplates(templates.filter(t=>t.id!==tp.id))} className="mt-3 text-rose-500 text-[10px] font-bold">삭제</button>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates,{id:'t'+Date.now(),title:'새 문구',content:''}])} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-300 font-bold active:bg-white">+ 추가</button>
                            </div>
                        )}
                    </main>

                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-slate-900/95 backdrop-blur-xl p-6 pb-10 rounded-t-[40px] shadow-2xl z-[60] slide-up border-t border-white/10 text-white">
                            <div className="flex justify-between items-center mb-6 px-2">
                                <span className="font-bold text-lg">{selectedIds.length}명 선택됨</span>
                                <div className="flex gap-2">
                                    <button onClick={() => { if(confirm('삭제?')) { setStudents(students.filter(s => !selectedIds.includes(s.id))); setSelectedIds([]); } }} className="bg-rose-500/20 text-rose-400 px-4 py-2 rounded-2xl text-[11px] font-bold">삭제</button>
                                    <button onClick={() => setSelectedIds([])} className="bg-white/10 px-4 py-2 rounded-2xl text-[11px] font-bold">취소</button>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-2.5 justify-center overflow-y-auto max-h-40 no-scrollbar">
                                {templates.map(tp => (
                                    <button key={tp.id} onClick={() => sendSMS(students.filter(s=>selectedIds.includes(s.id)), tp)} className="bg-blue-600 text-white px-6 py-3.5 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all">{tp.title} 발송</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && selectedIds.length === 0 && (
                        <button onClick={() => { setTargetStudent(null); setModalMode('add'); }} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-50 transition-transform active:scale-90"><i className="fa-solid fa-plus"></i></button>
                    )}

                    {modalMode && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in shadow-2xl overflow-y-auto max-h-[90vh] border border-white/20">
                                {modalMode === 'view' ? (
                                    <div className="space-y-6 text-center">
                                        <span className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">{targetStudent.group}</span>
                                        <h3 className="text-2xl font-black text-slate-800 mt-2">{targetStudent.name}</h3>
                                        <div className="space-y-3 text-left">
                                            <div className="bg-slate-50 p-4 rounded-3xl"><div className="text-[10px] font-black text-slate-400 mb-1">본인 번호</div><div className="text-lg font-bold text-slate-700">{targetStudent.self || '-'}</div></div>
                                            <div className="grid grid-cols-2 gap-2"><div className="bg-slate-50 p-4 rounded-3xl"><div className="text-[10px] font-black text-slate-400 mb-1">부 번호</div><div className="text-sm font-bold text-slate-700">{targetStudent.father || '-'}</div></div><div className="bg-slate-50 p-4 rounded-3xl"><div className="text-[10px] font-black text-slate-400 mb-1">모 번호</div><div className="text-sm font-bold text-slate-700">{targetStudent.mother || '-'}</div></div></div>
                                            <div className="bg-slate-50 p-4 rounded-3xl"><div className="text-[10px] font-black text-slate-400 mb-1">메모</div><div className="text-sm font-medium text-slate-600 whitespace-pre-wrap leading-relaxed">{targetStudent.memo || '내용 없음'}</div></div>
                                        </div>
                                        <div className="flex flex-col gap-2 pt-4"><button onClick={() => setModalMode('edit')} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">수정하기</button><button onClick={() => setModalMode(null)} className="w-full font-bold text-slate-400 py-4">닫기</button></div>
                                    </div>
                                ) : (
                                    <div className="space-y-4 text-xs font-bold">
                                        <h3 className="text-xl font-black mb-6 text-blue-600 text-center">{modalMode === 'edit' ? '정보 수정' : '학생 직접 추가'}</h3>
                                        <div className="grid grid-cols-2 gap-2"><select className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={targetStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId)} onChange={e => setTargetStudent({...targetStudent, group: e.target.value})}>{groups.map(g => <option key={g} value={g}>{g}</option>)}</select><input className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-blue-500 font-bold" value={targetStudent?.name || ''} onChange={e => setTargetStudent({...targetStudent, name: e.target.value})} placeholder="이름" /></div>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" value={targetStudent?.self || ''} onChange={e => setTargetStudent({...targetStudent, self: e.target.value})} placeholder="본인 번호" /><div className="grid grid-cols-2 gap-2"><input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" value={targetStudent?.father || ''} onChange={e => setTargetStudent({...targetStudent, father: e.target.value})} placeholder="부 번호" /><input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" value={targetStudent?.mother || ''} onChange={e => setTargetStudent({...targetStudent, mother: e.target.value})} placeholder="모 번호" /></div><textarea className="w-full p-4 bg-slate-50 rounded-2xl outline-none min-h-[80px] font-medium" value={targetStudent?.memo || ''} onChange={e => setTargetStudent({...targetStudent, memo: e.target.value})} placeholder="메모" />
                                        <div className="flex flex-col gap-2 pt-4"><button onClick={() => { if(!targetStudent.name) return alert('이름 필수'); const final = { ...targetStudent, group: targetStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId), activeTargets: targetStudent?.activeTargets || { self: true, father: false, mother: false } }; if(final.id) setStudents(students.map(st => st.id === final.id ? final : st)); else setStudents([...students, {...final, id: Date.now()}]); setModalMode(null); }} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">저장</button><div className="flex gap-2">{modalMode === 'edit' && <button onClick={() => { if(confirm('삭제?')) { setStudents(students.filter(s => s.id !== targetStudent.id)); setModalMode(null); } }} className="flex-1 bg-rose-50 text-rose-500 font-bold py-4 rounded-3xl border border-rose-100">삭제</button>}<button onClick={() => setModalMode(modalMode === 'edit' ? 'view' : null)} className="flex-1 font-bold text-slate-400 py-4 text-xs">취소</button></div></div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showGroupModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6 text-xs text-sans">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in max-h-[85vh] flex flex-col shadow-2xl">
                                <h3 className="text-xl font-black mb-1 text-blue-600 text-center">학급 관리</h3>
                                
                                <div className="flex gap-2 mt-4">
                                    <button onClick={downloadTemplate} className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold text-[10px]"><i className="fa-solid fa-download mr-1"></i> 양식 받기</button>
                                    <label className="flex-1 bg-blue-50 text-blue-600 py-3 rounded-2xl font-bold text-[10px] text-center cursor-pointer">
                                        <i className="fa-solid fa-upload mr-1"></i> 명단 올리기
                                        <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                </div>

                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 mt-6">
                                    {groups.map(g => (
                                        <div key={g} className="flex items-center gap-3 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                            <span className="flex-1 font-black text-slate-700 text-sm">{g}</span>
                                            <button onClick={() => { const n = prompt("새 이름", g); if(n && n !== g) { setGroups(groups.map(x => x === g ? n : x)); setStudents(students.map(s => s.group === g ? {...s, group: n} : s)); } }} className="w-9 h-9 bg-white text-blue-600 rounded-xl shadow-sm flex items-center justify-center text-xs"><i className="fa-solid fa-pen"></i></button>
                                            <button onClick={() => { if(groups.length > 1 && confirm(`'${g}' 반을 삭제할까요?`)) { setGroups(groups.filter(x => x !== g)); setStudents(students.filter(s => s.group !== g)); setActiveGroupId('전체'); } }} className="w-9 h-9 bg-rose-50 text-rose-500 rounded-xl shadow-sm flex items-center justify-center text-xs"><i className="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    ))}
                                    <button onClick={() => { const n = prompt('새 반 이름'); if(n) setGroups([...groups, n]); }} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold mt-4">+ 학급 추가</button>
                                </div>
                                <button onClick={() => setShowGroupModal(false)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-6">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(()=>{});
        }
    </script>
</body>
</html>
